<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>JavaScript CRUD - Kategóriák</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #bcaaaa; padding: 40px;">

    <div class="container bg-white p-4 rounded-4 shadow" style="border: 1px solid #ced4da;">
        <h2 class="mb-4" style="color: #5a4a4a; font-weight: bold;">Kategóriák kezelése (JavaScript CRUD)</h2>
        
        <div class="mb-4 p-3 border rounded" style="background-color: #fdfdfd;">
            <div class="input-group">
                <input type="text" id="kategoriaNev" class="form-control" placeholder="Új kategória neve...">
                <button id="submitBtn" class="btn" style="background-color: #8e7e7e; color: white; font-weight: bold;" onclick="handleAction()">Hozzáadás</button>
            </div>
            <small id="validationMsg" class="text-danger d-none">A mező kitöltése kötelező!</small>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead style="background-color: #a89393; color: white;">
                    <tr>
                        <th style="width: 10%;">ID</th>
                        <th style="width: 60%;">Név</th>
                        <th style="width: 30%;" class="text-center">Műveletek</th>
                    </tr>
                </thead>
                <tbody id="kategoriaTableBody">
                    </tbody>
            </table>
        </div>
        
        <div class="mt-4 text-start">
            <a href="index.html" class="fw-bold text-decoration-underline" style="color: #333;">← Vissza a főoldalra</a>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
